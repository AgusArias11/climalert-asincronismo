services:

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: climalert-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - climalert


  climalert-service:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: climalert-service

    depends_on:
      rabbitmq:
        condition: service_healthy

    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

    ports:
      - "8080:8080"

    networks:
      - climalert


networks:
  climalert:
    driver: bridge